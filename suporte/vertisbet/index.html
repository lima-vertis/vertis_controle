<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolão da Empresa</title>

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1f2937;
      --text-strong: #111827;
      --muted: #6b7280;
      --primary: #f97316;
      --primary-dark: #c2410c;
      --primary-light: #fb923c;
      --primary-soft: #ffedd5;
      --green: #16a34a;
      --green-dark: #166534;
      --field: #15803d;
      --field-light: #22c55e;
      --border: #e5e7eb;
      --border-orange: #fdba74;
      --success: #22c55e;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      --shadow-orange: 0 18px 40px rgba(249, 115, 22, 0.18);
      --shadow-field: 0 20px 55px rgba(21, 128, 61, 0.20);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(249, 115, 22, 0.20), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(34, 197, 94, 0.18), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, #f8fafc 46%, #ffffff 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(15, 23, 42, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, .035) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: linear-gradient(to bottom, black, transparent 78%);
      pointer-events: none;
    }

    .orb {
      position: fixed;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      filter: blur(34px);
      opacity: .18;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
      background: var(--primary);
    }

    .orb.one { left: -90px; top: 210px; }
    .orb.two { right: -90px; bottom: 80px; background: var(--field-light); animation-delay: -3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-28px) scale(1.05); }
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 56px;
    }

    .panel {
      background: rgba(255,255,255,.94);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .hero {
      position: relative;
      padding: 34px;
      margin-bottom: 22px;
      background:
        linear-gradient(115deg, rgba(255,255,255,.96) 0%, rgba(255,247,237,.94) 45%, rgba(240,253,244,.94) 100%);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 22px;
      background:
        linear-gradient(90deg, rgba(22, 101, 52, .07) 1px, transparent 1px),
        linear-gradient(rgba(22, 101, 52, .07) 1px, transparent 1px);
      background-size: 34px 34px;
      pointer-events: none;
      mask-image: linear-gradient(to bottom, black, transparent 72%);
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -88px;
      width: min(820px, 86%);
      height: 230px;
      transform: translateX(-50%);
      border-radius: 50% 50% 0 0;
      border: 2px solid rgba(22, 101, 52, .16);
      border-bottom: 0;
      pointer-events: none;
    }

    .topline, h1, .scoreboard, .stats { position: relative; z-index: 1; }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 26px;
      flex-wrap: wrap;
    }

    .badge {
      width: fit-content;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 9px 14px;
      border-radius: 999px;
      background: #111827;
      border: 1px solid rgba(255,255,255,.18);
      color: #ffffff;
      font-size: 13px;
      font-weight: 950;
      box-shadow: 0 12px 30px rgba(17, 24, 39, .18);
    }

    .badge::after {
      content: "⚽";
      font-size: 15px;
    }

    .match-date {
      padding: 9px 13px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
    }

    .pulse {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 0 0 rgba(34,197,94,.7);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      70% { box-shadow: 0 0 0 12px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    h1 {
      margin: 0 0 30px;
      text-align: center;
      font-size: clamp(34px, 4.8vw, 64px);
      line-height: .95;
      letter-spacing: -2.4px;
      color: var(--text-strong);
    }

    .gradient-text {
      background: linear-gradient(90deg, var(--primary), #ea580c 55%, var(--green));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 26px;
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 34px;
      background:
        linear-gradient(90deg, rgba(22, 163, 74, .10) 1px, transparent 1px),
        linear-gradient(rgba(22, 163, 74, .10) 1px, transparent 1px),
        linear-gradient(135deg, #ffffff, #fff7ed 48%, #f0fdf4);
      background-size: 36px 36px, 36px 36px, auto;
      border: 1px solid rgba(253, 186, 116, .9);
      box-shadow: var(--shadow-field);
    }

    .team { text-align: center; min-width: 0; }

    .flag {
      width: 96px;
      height: 96px;
      display: grid;
      place-items: center;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ffffff, #fff7ed);
      border: 4px solid #ffffff;
      outline: 2px solid var(--border-orange);
      color: var(--primary);
      font-size: 38px;
      font-weight: 950;
      box-shadow: 0 16px 30px rgba(15, 23, 42, .14);
      overflow: hidden;
    }

    .flag img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .flag.fallback { overflow: visible; border-radius: 28px; }

    .team-name {
      display: inline-block;
      max-width: 100%;
      padding: 8px 14px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid var(--border);
      font-size: clamp(19px, 2.5vw, 30px);
      font-weight: 950;
      color: var(--text-strong);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .06);
    }

    .real-score {
      min-width: 300px;
      padding: 24px 28px;
      border-radius: 30px;
      background: #111827;
      border: 3px solid #ffffff;
      outline: 2px solid var(--primary);
      box-shadow: 0 22px 48px rgba(17, 24, 39, .24);
      text-align: center;
      color: #ffffff;
      position: relative;
    }

    .real-score::before {
      content: "PLACAR";
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      padding: 5px 13px;
      border-radius: 999px;
      background: var(--primary);
      color: #ffffff;
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .12em;
      box-shadow: 0 10px 22px rgba(249,115,22,.28);
    }

    .score-label {
      color: #fdba74;
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .score-numbers {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      color: #ffffff;
      font-weight: 950;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .score-numbers strong {
      font-size: clamp(62px, 8vw, 94px);
      letter-spacing: -4px;
      text-shadow: 0 4px 0 rgba(249, 115, 22, .25);
    }

    .score-numbers span { color: var(--primary-light); font-size: 42px; transform: translateY(-4px); }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 740px;
      margin: 30px auto 0;
    }

    .stat {
      position: relative;
      padding: 16px 14px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: 0 12px 26px rgba(15,23,42,.06);
    }

    .stat::before {
      content: "";
      position: absolute;
      top: 0;
      left: 18px;
      right: 18px;
      height: 4px;
      border-radius: 0 0 999px 999px;
      background: linear-gradient(90deg, var(--primary), var(--green));
    }

    .stat strong { display: block; color: var(--text-strong); font-size: 27px; }
    .stat span { color: var(--muted); font-size: 12px; font-weight: 850; text-transform: uppercase; letter-spacing: .04em; }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 18px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ffffff, #fff7ed);
    }

    .search { flex: 1; min-width: 180px; }

    .search input,
    .toolbar select {
      width: 100%;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      outline: none;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 14px;
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    .search input:focus,
    .toolbar select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(249, 115, 22, .12); }
    .toolbar select { max-width: 180px; cursor: pointer; }

    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

    .bet-card {
      position: relative;
      padding: 20px;
      border-radius: 24px;
      background:
        linear-gradient(#ffffff, #ffffff) padding-box,
        linear-gradient(135deg, rgba(249,115,22,.35), rgba(34,197,94,.25)) border-box;
      border: 1px solid transparent;
      box-shadow: 0 10px 30px rgba(15,23,42,.06);
      overflow: hidden;
      transform: translateY(14px);
      opacity: 0;
      animation: appear .55s ease forwards;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
    }

    .bet-card::before {
      content: "PALPITE";
      position: absolute;
      top: 14px;
      right: -36px;
      transform: rotate(35deg);
      padding: 5px 38px;
      background: #f3f4f6;
      color: #9ca3af;
      font-size: 10px;
      font-weight: 950;
      letter-spacing: .1em;
    }

    .bet-card:hover { transform: translateY(-6px) scale(1.01); box-shadow: var(--shadow-orange); }

    .bet-card.exact {
      background:
        linear-gradient(180deg, #ffffff, #fff7ed) padding-box,
        linear-gradient(135deg, var(--primary), var(--green)) border-box;
      box-shadow: 0 16px 36px rgba(249, 115, 22, .16);
    }

    .hit-badge {
      width: fit-content;
      margin-bottom: 12px;
      padding: 7px 11px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: #c2410c;
      border: 1px solid var(--border-orange);
      font-size: 12px;
      font-weight: 950;
    }

    .person { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 35% 35%, #ffffff 0 6%, transparent 7%), linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
      font-weight: 950;
      box-shadow: 0 12px 24px rgba(249,115,22,.22);
      border: 3px solid #ffffff;
      outline: 1px solid var(--border-orange);
    }

    .name { font-weight: 950; font-size: 17px; color: var(--text-strong); }
    .sector { color: var(--muted); font-size: 12px; font-weight: 750; margin-top: 3px; }

    .score {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(22, 163, 74, .08) 1px, transparent 1px),
        linear-gradient(#f8fafc, #f8fafc);
      background-size: 22px 22px, auto;
      border: 1px solid var(--border);
    }

    .goal { text-align: center; }

    .goal small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .goal strong { color: var(--text-strong); font-size: 40px; line-height: 1; font-variant-numeric: tabular-nums; }
    .dash { color: var(--primary); font-weight: 950; font-size: 20px; }

    .empty, .loading, .error { padding: 34px; text-align: center; color: var(--muted); }

    code {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #f3f4f6;
      color: var(--text-strong);
      border: 1px solid var(--border);
    }

    .loader {
      width: 44px;
      height: 44px;
      margin: 0 auto 14px;
      border-radius: 999px;
      border: 4px solid #fed7aa;
      border-top-color: var(--primary);
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes appear { to { transform: translateY(0); opacity: 1; } }

    @media (max-width: 980px) {
      .scoreboard { grid-template-columns: 1fr; }
      .real-score { order: 2; width: min(100%, 360px); margin: 0 auto; }
      .team:first-child { order: 1; }
      .team:last-child { order: 3; }
      .cards { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 620px) {
      .page { width: min(100% - 22px, 1180px); padding-top: 18px; }
      .hero { padding: 22px; border-radius: 22px; }
      .topline { justify-content: center; text-align: center; }
      .flag { width: 72px; height: 72px; font-size: 28px; }
      .team-name { white-space: normal; }
      .real-score { min-width: 0; padding: 20px; }
      .stats, .cards { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar select { max-width: none; }
    }
  </style>
</head>

<body>
  <div class="orb one"></div>
  <div class="orb two"></div>

  <main class="page">
    <section class="panel hero">
      <div class="topline">
        <div class="badge">
          <span class="pulse"></span>
          Bolão da firma
        </div>

        <div class="match-date" id="matchDate">Carregando partida...</div>
      </div>

      <h1>
        Apostas em campo: <span class="gradient-text">quem cravou?</span>
      </h1>

      <div class="scoreboard">
        <div class="team">
          <div class="flag" id="team1Initial">?</div>
          <div class="team-name" id="team1Name">Time 1</div>
        </div>

        <div class="real-score">
          <div class="score-label">Placar real</div>

          <div class="score-numbers">
            <strong id="realScore1">-</strong>
            <span>x</span>
            <strong id="realScore2">-</strong>
          </div>
        </div>

        <div class="team">
          <div class="flag" id="team2Initial">?</div>
          <div class="team-name" id="team2Name">Time 2</div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <strong id="totalBets">0</strong>
          <span>palpites na rodada</span>
        </div>

        <div class="stat">
          <strong id="totalSectors">0</strong>
          <span>torcidas/setores</span>
        </div>

        <div class="stat">
          <strong id="exactHits">0</strong>
          <span>placares cravados</span>
        </div>
      </div>
    </section>

    <section class="panel toolbar">
      <div class="search">
        <input type="text" id="searchInput" placeholder="🔎 Buscar palpiteiro..." />
      </div>

      <select id="sectorFilter">
        <option value="">Todas as torcidas</option>
      </select>
    </section>

    <section id="content">
      <div class="panel loading">
        <div class="loader"></div>
        Carregando apostas...
      </div>
    </section>
  </main>

  <script>
    const ENDPOINT = 'http://localhost:9000/api/V1.1/wc_jogo/2';

    let bets = [];

    const elements = {
      content: document.getElementById('content'),
      searchInput: document.getElementById('searchInput'),
      sectorFilter: document.getElementById('sectorFilter'),
      matchDate: document.getElementById('matchDate'),
      team1Name: document.getElementById('team1Name'),
      team2Name: document.getElementById('team2Name'),
      team1Initial: document.getElementById('team1Initial'),
      team2Initial: document.getElementById('team2Initial'),
      realScore1: document.getElementById('realScore1'),
      realScore2: document.getElementById('realScore2'),
      totalBets: document.getElementById('totalBets'),
      totalSectors: document.getElementById('totalSectors'),
      exactHits: document.getElementById('exactHits')
    };

    function formatDate(value) {
      if (!value) return '-';

      const isoValue = value.replace(' ', 'T');
      const date = new Date(isoValue);

      if (Number.isNaN(date.getTime())) return value;

      return new Intl.DateTimeFormat('pt-BR', {
        dateStyle: 'full',
        timeStyle: 'short'
      }).format(date);
    }

    function initials(text) {
      return String(text || '?')
        .trim()
        .charAt(0)
        .toUpperCase();
    }

    function normalizeCountryName(text) {
      return String(text || '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/ç/g, 'c')
        .replace(/[^a-z0-9 ]/g, ' ')
        .replace(/\s+/g, ' ');
    }

    const countryFlags = {
      'afeganistao': 'af',
      'africa do sul': 'za',
      'albania': 'al',
      'alemanha': 'de',
      'andorra': 'ad',
      'angola': 'ao',
      'arabia saudita': 'sa',
      'argelia': 'dz',
      'argentina': 'ar',
      'armenia': 'am',
      'australia': 'au',
      'austria': 'at',
      'belgica': 'be',
      'bolivia': 'bo',
      'bosnia': 'ba',
      'bosnia e herzegovina': 'ba',
      'brasil': 'br',
      'bulgaria': 'bg',
      'camaroes': 'cm',
      'canada': 'ca',
      'catar': 'qa',
      'chile': 'cl',
      'china': 'cn',
      'colombia': 'co',
      'coreia do sul': 'kr',
      'costa do marfim': 'ci',
      'costa rica': 'cr',
      'croacia': 'hr',
      'dinamarca': 'dk',
      'egito': 'eg',
      'equador': 'ec',
      'escocia': 'gb-sct',
      'eslovaquia': 'sk',
      'eslovenia': 'si',
      'espanha': 'es',
      'estados unidos': 'us',
      'eua': 'us',
      'finlandia': 'fi',
      'franca': 'fr',
      'gales': 'gb-wls',
      'gana': 'gh',
      'grecia': 'gr',
      'holanda': 'nl',
      'paises baixos': 'nl',
      'hungria': 'hu',
      'inglaterra': 'gb-eng',
      'ira': 'ir',
      'irlanda': 'ie',
      'irlanda do norte': 'gb-nir',
      'islandia': 'is',
      'israel': 'il',
      'italia': 'it',
      'japao': 'jp',
      'marrocos': 'ma',
      'mexico': 'mx',
      'nigeria': 'ng',
      'noruega': 'no',
      'nova zelandia': 'nz',
      'panama': 'pa',
      'paraguai': 'py',
      'peru': 'pe',
      'polonia': 'pl',
      'portugal': 'pt',
      'republica tcheca': 'cz',
      'romenia': 'ro',
      'russia': 'ru',
      'senegal': 'sn',
      'servia': 'rs',
      'suecia': 'se',
      'suica': 'ch',
      'tunisia': 'tn',
      'turquia': 'tr',
      'ucrania': 'ua',
      'uruguai': 'uy'
    };

    function setTeamFlag(element, teamName) {
      const code = countryFlags[normalizeCountryName(teamName)];

      element.classList.toggle('fallback', !code);

      if (!code) {
        element.textContent = initials(teamName);
        return;
      }

      element.innerHTML = `
        <img
          src="https://flagcdn.com/w160/${code}.png"
          srcset="https://flagcdn.com/w320/${code}.png 2x"
          alt="Bandeira de ${teamName}"
          loading="lazy"
          onerror="this.parentElement.classList.add('fallback'); this.parentElement.textContent='${initials(teamName)}';"
        >
      `;
    }

    function hasRealScore(match) {
      return match &&
        match.pc_gol_1 !== null &&
        match.pc_gol_1 !== undefined &&
        match.pc_gol_2 !== null &&
        match.pc_gol_2 !== undefined;
    }

    function isExactHit(item) {
      return hasRealScore(item) &&
        Number(item.gol_1) === Number(item.pc_gol_1) &&
        Number(item.gol_2) === Number(item.pc_gol_2);
    }

    function updateMatchInfo(data) {
      if (!data.length) return;

      const match = data[0];
      const sectors = new Set(data.map(item => item.setor).filter(Boolean));
      const hits = data.filter(isExactHit).length;

      elements.matchDate.textContent = formatDate(match.dth_jogo);
      elements.team1Name.textContent = match.time_1;
      elements.team2Name.textContent = match.time_2;
      setTeamFlag(elements.team1Initial, match.time_1);
      setTeamFlag(elements.team2Initial, match.time_2);

      elements.realScore1.textContent = hasRealScore(match) ? match.pc_gol_1 : '-';
      elements.realScore2.textContent = hasRealScore(match) ? match.pc_gol_2 : '-';

      elements.totalBets.textContent = data.length;
      elements.totalSectors.textContent = sectors.size;
      elements.exactHits.textContent = hits;
    }

    function fillSectorFilter(data) {
      const sectors = [...new Set(data.map(item => item.setor).filter(Boolean))].sort();

      sectors.forEach(sector => {
        const option = document.createElement('option');
        option.value = sector;
        option.textContent = sector;
        elements.sectorFilter.appendChild(option);
      });
    }

    function getFilteredBets() {
      const search = elements.searchInput.value.trim().toLowerCase();
      const sector = elements.sectorFilter.value;

      return bets.filter(item => {
        const matchesName = item.nome.toLowerCase().includes(search);
        const matchesSector = !sector || item.setor === sector;

        return matchesName && matchesSector;
      });
    }

    function renderCards() {
      const filtered = getFilteredBets();

      if (!filtered.length) {
        elements.content.innerHTML = `
          <div class="panel empty">
            Nenhuma aposta encontrada com os filtros selecionados.
          </div>
        `;
        return;
      }

      elements.content.innerHTML = `
        <div class="cards">
          ${filtered.map((item, index) => {
            const exact = isExactHit(item);

            return `
              <article class="bet-card ${exact ? 'exact' : ''}" style="animation-delay: ${index * 45}ms">
                ${exact ? '<div class="hit-badge">🏆 Cravou o placar</div>' : ''}

                <div class="person">
                  <div class="avatar">${initials(item.nome)}</div>
                  <div>
                    <div class="name">${item.nome}</div>
                    <div class="sector">🏟️ Setor ${item.setor}</div>
                  </div>
                </div>

                <div class="score">
                  <div class="goal">
                    <small>${item.time_1}</small>
                    <strong>${item.gol_1}</strong>
                  </div>

                  <div class="dash">x</div>

                  <div class="goal">
                    <small>${item.time_2}</small>
                    <strong>${item.gol_2}</strong>
                  </div>
                </div>
              </article>
            `;
          }).join('')}
        </div>
      `;
    }

    async function loadBets() {
      try {
        const response = await fetch(ENDPOINT);

        if (!response.ok) {
          throw new Error(`Erro HTTP ${response.status}`);
        }

        bets = await response.json();

        updateMatchInfo(bets);
        fillSectorFilter(bets);
        renderCards();
      } catch (error) {
        elements.content.innerHTML = `
          <div class="panel error">
            <strong>Não foi possível carregar as apostas.</strong><br><br>
            Verifique se o endpoint local está ativo em:<br>
            <code>${ENDPOINT}</code><br><br>
            Detalhe: ${error.message}
          </div>
        `;
      }
    }

    elements.searchInput.addEventListener('input', renderCards);
    elements.sectorFilter.addEventListener('change', renderCards);

    loadBets();
  </script>
</body>
</html>
